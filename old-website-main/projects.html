<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrismMTR - Projects</title>
  
  <!-- Open Graph / Social Media Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="PrismMTR Projects">
  <meta property="og:description" content="Discover and share MTR buildings, stations, lines, and infrastructure">
  <meta property="og:image" content="assets/img/PrismMTRlogo-optimized.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PrismMTR Projects">
  <meta name="twitter:description" content="Discover and share MTR buildings, stations, lines, and infrastructure">
  <meta name="twitter:image" content="assets/img/PrismMTRlogo-optimized.png">
  
  <link rel="icon" type="image/png" href="assets/img/favicon.png">

  <!-- CRITICAL: Theme must be set BEFORE any CSS loads to prevent white flash -->
  <script>
    (function() {
      try {
        var darkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (darkMode) {
          document.documentElement.classList.add('dark-mode');
          document.documentElement.style.colorScheme = 'dark';
        }
      } catch(e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/projects.css">
</head>
<body data-page="projects">
  <canvas id="starCanvas"></canvas>
  
  <main class="projects-page">
    <!-- Hero -->
    <section class="projects-hero">
      <span class="hero-badge">Community</span>
      <h1 class="projects-hero__title">Projects</h1>
      <p class="projects-hero__subtitle">Discover and share MTR buildings, stations, lines, and infrastructure</p>
    </section>
    
    <!-- Controls -->
    <section class="projects-controls">
      <div class="projects-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="projectSearch" placeholder="Search projects...">
      </div>
      
      <div class="projects-filters">
        <select id="filterCategory">
          <option value="">All Categories</option>
          <option value="building">Buildings</option>
          <option value="station">Stations</option>
          <option value="line_section">Line Sections</option>
          <option value="line">Lines</option>
        </select>
        
        <select id="filterRole">
          <option value="">All Projects</option>
          <option value="mine">My Projects</option>
          <option value="owner">As Owner</option>
          <option value="coowner">As Co-owner</option>
          <option value="member">As Member</option>
        </select>
      </div>
      
      <button class="btn btn--primary" id="createProjectBtn" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Project
      </button>
    </section>
    
    <!-- Projects Grid -->
    <section class="projects-grid" id="projectsGrid">
      <!-- Loading -->
      <div class="projects-loading" id="projectsLoading">
        <div class="spinner"></div>
        <p>Loading projects...</p>
      </div>
      
      <!-- Empty State -->
      <div class="projects-empty" id="projectsEmpty" style="display: none;">
        <div class="projects-empty__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h3>No projects yet</h3>
        <p>Be the first to share a project with the community!</p>
      </div>
    </section>
  </main>
  
  <!-- Create Project Modal -->
  <div class="modal" id="projectModal">
    <div class="modal__backdrop" data-action="close-project-modal" aria-hidden="true"></div>
    <div class="modal__container">
      <button class="modal__close" data-action="close-project-modal" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      
      <div class="project-modal">
        <!-- Header with image preview -->
        <div class="project-modal__header">
          <div class="project-modal__image-upload" id="imageUploadArea">
            <input type="file" id="projectImage" accept="image/*" hidden>
            <div class="project-modal__image-placeholder" id="imagePlaceholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Add cover image</span>
            </div>
            <img class="project-modal__image-preview" id="imagePreview" style="display: none;" alt="Project cover preview">
          </div>
        </div>
        
        <!-- Form -->
        <form class="project-modal__form" id="projectFormEl">
          <input type="hidden" id="projectId" value="">
          
          <div class="form-group">
            <label class="form-label" for="projectName">Project Name</label>
            <input type="text" class="form-input form-input--lg" id="projectName" placeholder="My Awesome Modpack" required maxlength="50">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="projectDescription">Description</label>
            <textarea class="form-textarea" id="projectDescription" placeholder="What makes your project special?" required minlength="20" maxlength="500" rows="3"></textarea>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="projectCategory">Category</label>
              <select class="form-select" id="projectCategory" required>
                <option value="">Select category...</option>
                <option value="building">Building</option>
                <option value="station">Station</option>
                <option value="line_section">Line Section</option>
                <option value="line">Line / Extension</option>
              </select>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="projectStatus">Status</label>
              <select class="form-select" id="projectStatus">
                <option value="active">Active</option>
                <option value="planning">Planning</option>
                <option value="completed">Completed</option>
                <option value="paused">Paused</option>
              </select>
            </div>
          </div>
          
          <!-- Team Section -->
          <div class="form-section-title">Team</div>
          
          <div class="form-row">
            <!-- Co-owners -->
            <div class="form-group">
              <label class="form-label">Co-owners <span class="form-hint" style="display:inline;margin:0;">(optional)</span></label>
              <div class="team-list" id="coownersList">
                <div class="team-list__empty" id="coownersEmpty">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                  </svg>
                  <span>No co-owners added</span>
                </div>
              </div>
              <div class="add-member">
                <div class="add-member__row">
                  <input type="text" class="form-input" id="coownerInput" placeholder="Enter username...">
                  <button type="button" class="btn btn--outline" id="addCoownerBtn">Add</button>
                </div>
              </div>
            </div>
            
            <!-- Members -->
            <div class="form-group">
              <label class="form-label">Members <span class="form-hint" style="display:inline;margin:0;">(optional)</span></label>
              <div class="team-list" id="membersList">
                <div class="team-list__empty" id="membersEmpty">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                  </svg>
                  <span>No members added</span>
                </div>
              </div>
              <div class="add-member">
                <div class="add-member__row">
                  <input type="text" class="form-input" id="memberInput" placeholder="Enter username...">
                  <button type="button" class="btn btn--outline" id="addMemberBtn">Add</button>
                </div>
              </div>
            </div>
          </div>
          
          <div class="form-actions">
            <button type="button" class="btn btn--ghost" data-action="close-project-modal">Cancel</button>
            <button type="submit" class="btn btn--primary" id="submitProjectBtn">Create Project</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <!-- View Project Modal -->
  <div class="modal" id="viewProjectModal">
    <div class="modal__backdrop" data-action="close-view-modal" aria-hidden="true"></div>
    <div class="modal__container modal__container--lg">
      <button class="modal__close" data-action="close-view-modal" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      
      <div class="project-view" id="projectView">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
  
  <script src="js/api-fetch-simple.js"></script>
  <script src="js/prefetch.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth-manager.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
