<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrismMTR - Discovery</title>

  <!-- Open Graph / Social Media Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="PrismMTR Discovery">
  <meta property="og:description" content="Explore metro lines, stations, buildings, and projects from the community">
  <meta property="og:image" content="assets/img/PrismMTRlogo-optimized.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PrismMTR Discovery">
  <meta name="twitter:description" content="Explore metro lines, stations, buildings, and projects from the community">
  <meta name="twitter:image" content="assets/img/PrismMTRlogo-optimized.png">

  <link rel="icon" type="image/png" href="assets/img/favicon.png">

  <!-- CRITICAL: Theme must be set BEFORE any CSS loads to prevent white flash -->
  <script>
    (function() {
      try {
        var darkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (darkMode) {
          document.documentElement.classList.add('dark-mode');
          document.documentElement.style.colorScheme = 'dark';
        }
      } catch(e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/discovery.css">
</head>
<body data-page="discovery">
  <canvas id="starCanvas"></canvas>

  <main class="discovery-page">
    <!-- Hero Section -->
    <section class="discovery-hero">
      <div class="discovery-hero__content">
        <span class="hero-badge">Explore</span>
        <h1 class="discovery-hero__title">Discovery</h1>
        <p class="discovery-hero__subtitle">Explore metro infrastructure created by the community</p>

        <!-- Global Search -->
        <div class="discovery-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="globalSearch" placeholder="Search lines, stations, buildings, projects...">
          <kbd class="discovery-search__shortcut">/</kbd>
        </div>
      </div>
    </section>

    <!-- Category Tabs -->
    <section class="discovery-tabs">
      <div class="discovery-tabs__container">
        <button class="discovery-tab active" data-tab="all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>All</span>
        </button>
        <button class="discovery-tab" data-tab="lines">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
            <line x1="4" y1="22" x2="4" y2="15"/>
          </svg>
          <span>Lines</span>
          <span class="discovery-tab__count" id="linesCount">0</span>
        </button>
        <button class="discovery-tab" data-tab="stations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span>Stations</span>
          <span class="discovery-tab__count" id="stationsCount">0</span>
        </button>
        <button class="discovery-tab" data-tab="buildings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 21h18"/>
            <path d="M5 21V7l8-4v18"/>
            <path d="M19 21V11l-6-4"/>
          </svg>
          <span>Buildings</span>
          <span class="discovery-tab__count" id="buildingsCount">0</span>
        </button>
        <button class="discovery-tab" data-tab="projects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Projects</span>
          <span class="discovery-tab__count" id="projectsCount">0</span>
        </button>
        <button class="discovery-tab" data-tab="companies">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 21h18"/>
            <path d="M9 21v-8H5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2h-4v8"/>
            <path d="M5 11V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"/>
            <circle cx="12" cy="3" r="1"/>
          </svg>
          <span>Companies</span>
          <span class="discovery-tab__count" id="companiesCount">0</span>
        </button>
      </div>
    </section>

    <!-- Filters Bar -->
    <section class="discovery-filters">
      <div class="discovery-filters__left">
        <span class="discovery-filters__label">Sort by:</span>
        <select class="discovery-select" id="sortSelect">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="name">Name (A-Z)</option>
          <option value="name_desc">Name (Z-A)</option>
        </select>
      </div>

      <div class="discovery-filters__right">
        <div class="discovery-view-toggle">
          <button class="view-btn active" data-view="grid" title="Grid View">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
          </button>
          <button class="view-btn" data-view="list" title="List View">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Results Stats -->
    <section class="discovery-stats">
      <span class="discovery-stats__text" id="resultsText">Loading...</span>
    </section>

    <!-- Content Grid -->
    <section class="discovery-content">
      <div class="discovery-grid" id="discoveryGrid">
        <!-- Loading State -->
        <div class="discovery-loading" id="discoveryLoading">
          <div class="spinner"></div>
          <p>Loading content...</p>
        </div>
      </div>

      <!-- Empty State -->
      <div class="discovery-empty" id="discoveryEmpty" style="display: none;">
        <div class="discovery-empty__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
        </div>
        <h3>No results found</h3>
        <p id="emptyMessage">Try adjusting your search or filters</p>
      </div>
    </section>

    <!-- Load More -->
    <section class="discovery-load-more" id="loadMoreSection" style="display: none;">
      <button class="btn btn--outline btn--lg" id="loadMoreBtn">
        Load More
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </section>
  </main>

  <!-- Detail Modal -->
  <div class="modal" id="detailModal">
    <div class="modal__backdrop" data-action="close-detail-modal" aria-hidden="true"></div>
    <div class="modal__container modal__container--lg">
      <button class="modal__close" data-action="close-detail-modal" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div class="detail-view" id="detailView">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </div>

  <script src="js/api-fetch-simple.js"></script>
  <script src="js/prefetch.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth-manager.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/discovery.js"></script>
</body>
</html>
