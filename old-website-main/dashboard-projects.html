<!DOCTYPE html>
<html lang="en" class="app-shell">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - PrismMTR Dashboard</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Projects - PrismMTR Dashboard">
  <meta property="og:description" content="Manage your projects and creations">
  <meta property="og:image" content="assets/img/PrismMTRlogo-optimized.png">

  <link rel="icon" type="image/png" href="assets/img/favicon.png">

  <script>
    (function() {
      try {
        var darkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (darkMode) {
          document.documentElement.classList.add('dark-mode');
          document.documentElement.style.colorScheme = 'dark';
        }
      } catch(e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/app-shell.css">
</head>
<body data-page="dashboard" data-section="projects">
  <canvas id="starCanvas"></canvas>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard-layout" id="mainContent">

    <aside class="dashboard-sidebar" id="dashboardSidebar">
      <a href="index.html" class="sidebar-brand">
        <img src="assets/img/PrismMTRlogo-optimized.png" alt="PrismMTR" class="sidebar-brand__logo">
        <span class="sidebar-brand__text">PrismMTR</span>
      </a>

      <div class="sidebar-user">
        <div class="sidebar-user__avatar" id="sidebarUserAvatar" data-action="show-user-profile" data-user-id="">?</div>
        <div class="sidebar-user__info">
          <div class="sidebar-user__name" id="sidebarUserName" data-action="show-user-profile" data-user-id="">User</div>
          <div class="sidebar-user__role" id="sidebarUserRole">Member</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-nav__section">
          <span class="sidebar-nav__label">Overview</span>
          <a href="dashboard.html" class="sidebar-nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>Home</span>
          </a>
        </div>

        <div class="sidebar-nav__section">
          <span class="sidebar-nav__label">Content</span>
          <a href="dashboard-companies.html" class="sidebar-nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/>
            </svg>
            <span>Companies</span>
          </a>
          <a href="dashboard-projects.html" class="sidebar-nav__item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span>Projects</span>
          </a>
          <a href="dashboard-posts.html" class="sidebar-nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span>Posts</span>
          </a>
        </div>

        <div class="sidebar-nav__section">
          <span class="sidebar-nav__label">Account</span>
          <a href="dashboard.html?section=settings" class="sidebar-nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>Settings</span>
          </a>
        </div>

        <div class="sidebar-nav__section sidebar-nav__section--admin" id="adminSection" style="display: none;">
          <span class="sidebar-nav__label">Administration</span>
          <a href="dashboard-admin.html" class="sidebar-nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>Admin Panel</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="sidebar-footer__btn" data-action="sidebar-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Sign Out</span>
        </button>
      </div>
    </aside>

    <main class="dashboard-main">
      <div class="section-header">
        <div class="section-header__text">
          <h1 class="section-header__title">Projects</h1>
          <p class="section-header__subtitle">Your projects and contributions</p>
        </div>
        <button class="btn btn--primary" id="createProjectBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Create Project
        </button>
      </div>

      <div class="projects-container">
        <div class="projects-loading" id="projectsLoading">
          <div class="spinner spinner--lg"></div>
          <p>Loading projects...</p>
        </div>

        <div class="projects-empty" id="projectsEmpty" style="display: none;">
          <div class="empty-state">
            <div class="empty-state__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <h3 class="empty-state__title">No projects yet</h3>
            <p class="empty-state__description">Create your first project to showcase your MTR creations.</p>
            <button class="btn btn--primary" id="createProjectEmptyBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Create Your First Project
            </button>
          </div>
        </div>

        <div class="dashboard-grid dashboard-grid--projects" id="projectsGrid" style="display: none;"></div>
      </div>
    </main>
  </div>

  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <script src="js/api-fetch-simple.js"></script>
  <script src="js/prefetch.js"></script>
  <script src="js/header-metrics.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth-manager.js"></script>
  <script src="js/guards-new.js" data-require-auth="true"></script>
  <script src="js/components.js"></script>
  <script src="js/create-modals.js"></script>
  <script src="js/dashboard-projects.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.getElementById('sidebarToggle');
      const sidebar = document.getElementById('dashboardSidebar');
      const overlay = document.getElementById('sidebarOverlay');

      if (toggle && sidebar) {
        toggle.addEventListener('click', () => {
          sidebar.classList.toggle('open');
          overlay?.classList.toggle('active');
        });
      }

      if (overlay) {
        overlay.addEventListener('click', () => {
          sidebar?.classList.remove('open');
          overlay.classList.remove('active');
        });
      }

      document.querySelector('[data-action="sidebar-logout"]')?.addEventListener('click', () => {
        if (typeof AuthManager !== 'undefined' && AuthManager.logout) {
          AuthManager.logout();
        } else if (typeof PrismAuth !== 'undefined') {
          PrismAuth.logout();
        }
      });
    });
  </script>
</body>
</html>
